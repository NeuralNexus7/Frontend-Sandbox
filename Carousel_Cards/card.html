<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Carousel Cards</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <div class="particles">
        <span style="background-image:url('Images/C.jpg')"></span>
        <span style="background-image:url('Images/GitHub.png')"></span>
        <span style="background-image:url('Images/Python.jpg')"></span>
        <span style="background-image:url('Images/js.jpg')"></span>
        <span style="background-image:url('Images/css.jpg')"></span>
    </div>

    <div class="cards-wrapper">

        <!-- Card 1 -->
        <div class="card-container">
            <div class="card card1">

                <div class="card-front">
                    <img src="Images/image.webp" class="card-bg-image" alt="">

                </div>

                <div class="card-back">
                </div>

            </div>
        </div>

        <!-- Card 2 -->
        <div class="card-container">

                </div>

                <div class="card-back">
                </div>

            </div>
        </div>

        <!-- Card 3 -->
        <div class="card-container">

                    <h2 class="heading">Card 3</h2>
                </div>

                <div class="card-back">
                </div>

            </div>
        </div>

        <!-- Card 4 -->
        <div class="card-container">

                <div class="card-front">

                    <h2 class="heading">Card 4</h2>
                </div>

                <div class="card-back">
                </div>

            </div>
        </div>

    </div>

</body>
</html>
